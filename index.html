<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />

    <title>Library</title>
  </head>
  <body>
    <div class="body">
      <div class="header">
        <h1 class="site-name">to-book</h1>
      </div>
      <div class="content-container">
        <div class="book-card">
          <div class="book-spine"></div>
          <div class="book-cover">
            <h3 class="book-author">Rick Riordan</h3>
            <h2 class="book-title">Percy Jackson e o Ladrão de Raios</h2>

            <h4 class="book-pages">400 pages</h4>
          </div>
          <div class="book-back"></div>
        </div>

        <div class="book-card">
            <div class="book-spine"></div>
            <div class="book-cover">
              <h3 class="book-author">Author Template</h3>
              <h2 class="book-title">Title Template</h2>
  
              <h4 class="book-pages">Pages Template</h4>
            </div>
            <div class="book-back"></div>
          </div>
      </div>

      <template id="card-template">
        
            <div class="book-card">
                <div class="book-spine"></div>
                <div class="book-cover">
                  <h3 class="book-author">Author Template</h3>
                  <h2 class="book-title">Title Template</h2>
      
                  <h4 class="book-pages">Pages Template</h4>
                </div>
                <div class="book-back"></div>
              </div>
      </template>
    </div>
  </body>
</html>
