<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />

    <title>Library</title>
  </head>
  <body>
    <div class="body">
      <div class="header">
        <h1 class="site-name">to-book</h1>
      </div>
      <div class="content-container">
        <div class="book-card add">
          <div class="book-spine"></div>
          <div class="book-cover">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="200"
              height="100"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-book-plus"
            >
              <path
                d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"
              />
              <path d="M9 10h6" />
              <path d="M12 7v6" />
            </svg>
          </div>
          <div class="book-back"></div>
        </div>
      </div>

      <dialog class="form-modal">
        <form method="dialog" id="add-book-form">
          <label for="title">
            <span>Title:</span>
            <input type="text" id="title" name="title" autofocus required />
          </label>
          <label for="author">
            <span>Author:</span>
            <input type="text" id="author" name="author" required />
          </label>
          <label for="pages">
            <span>Pages:</span>
            <input type="number" id="pages" name="pages" required />
          </label>
          <div>
            <span>Have you readed the book?</span>
            <div>
              <input type="radio" id="yes" name="radio" value="true" checked />
              <label for="yes">Yes, i did it!</label>
            </div>
            <div>
              <input type="radio" id="no" name="radio" value="false" />
              <label for="no">No, i didn't</label>
            </div>
          </div>
          <div class="btn-container">
            <button class="cancel-btn" type="reset">Cancel</button>
            <button class="save-btn" type="submit">Save</button>
          </div>
        </form>
      </dialog>

      <template id="card-template">
        <div class="book-card" data-deleted="false">
          <div class="book-spine"></div>
          <div class="book-cover">
            <h3 class="book-author">Author Template</h3>
            <h2 class="book-title">Title Template</h2>

            <h4 class="book-pages">Pages Template</h4>
            <button class="delete-btn">Delete</button>
          </div>
          <div class="book-back"></div>
        </div>
      </template>
    </div>
  </body>
</html>
